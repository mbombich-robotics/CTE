<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHS Countdown Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;600;700&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d0d;
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* === HEADER === */
        header.page-header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 14px 20px 12px;
            text-align: center;
        }

        header.page-header .logo {
            width: 96px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(204, 0, 0, 0.55));
        }

        header.page-header .title-stack {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        header.page-header .school-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3.6rem, 7.8vw, 6rem);
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
            line-height: 1;
        }

        header.page-header .year-subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(1.05rem, 1.65vw, 1.4rem);
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #cc0000;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            header.page-header { gap: 10px; padding: 10px 12px 12px; }
            header.page-header .logo { width: 64px; }
            header.page-header .title-stack { align-items: center; }
        }

        #featured {
            flex: 2 1 0;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #featured .bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.5);
            image-rendering: pixelated;
        }

        #featured .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px 32px 22px;
            width: fit-content;
            border: 2px solid #cc0000;
            border-radius: 8px;
            box-shadow: 0 0 14px rgba(204, 0, 0, 0.25);
        }

        #featured .countdown-prefix {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.7rem, 1.4vw, 1rem);
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #cc0000;
            margin-bottom: 8px;
        }

        #featured .event-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(1.4rem, 3vw, 2.2rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.6), 0 2px 8px rgba(0,0,0,0.8);
            margin-bottom: 6px;
        }

        #featured .event-date {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.9rem, 1.8vw, 1.4rem);
            font-weight: 600;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.65);
            text-shadow: 0 1px 6px rgba(0,0,0,0.9);
            margin-bottom: 20px;
        }

        #featured .digits {
            display: flex;
            gap: clamp(16px, 3vw, 40px);
            align-items: flex-start;
            justify-content: center;
        }

        #featured .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #featured .num {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(4rem, 10vw, 9rem);
            font-weight: 900;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 40px rgba(255,255,255,0.9), 0 2px 12px rgba(0,0,0,0.9);
            min-width: 2ch;
            text-align: center;
        }

        #featured .lbl {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.7rem, 1.5vw, 1.1rem);
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
            margin-top: 6px;
        }

        #featured .sep {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 7vw, 6rem);
            line-height: clamp(4rem, 10vw, 9rem);
            font-weight: 900;
            color: rgba(255,255,255,0.5);
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        #featured .zero-msg {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px #fff;
            letter-spacing: 4px;
        }

        #mini-row {
            flex: 1 1 0;
            display: flex;
            gap: 6px;
            padding: 4px 6px 6px 6px;
        }

        .mini-clock {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .mini-clock .bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
            image-rendering: pixelated;
        }

        .mini-clock .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 14px 18px 16px;
            width: fit-content;
            border: 2px solid #cc0000;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(204, 0, 0, 0.22);
        }

        .mini-clock .countdown-prefix {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.75rem, 1.35vw, 1.05rem);
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(204, 0, 0, 0.85);
            margin-bottom: 4px;
        }

        .mini-clock .event-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.9rem, 1.95vw, 1.5rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
            margin-bottom: 3px;
        }

        .mini-clock .event-date {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.75rem, 1.5vw, 1.2rem);
            font-weight: 600;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.55);
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            margin-bottom: 12px;
        }

        .mini-clock .digits {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            justify-content: center;
        }

        .mini-clock .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mini-clock .num {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 4.2vw, 3.9rem);
            font-weight: 900;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 12px rgba(255,255,255,0.8), 0 1px 6px rgba(0,0,0,0.9);
            min-width: 2ch;
            text-align: center;
        }

        .mini-clock .lbl {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.75rem, 1.35vw, 1.13rem);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.7);
            text-shadow: 0 1px 3px rgba(0,0,0,0.9);
            margin-top: 5px;
        }

        .mini-clock .sep {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 3vw, 2.7rem);
            line-height: clamp(1.8rem, 4.2vw, 3.9rem);
            font-weight: 900;
            color: rgba(255,255,255,0.35);
        }

        .mini-clock .zero-msg {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.35rem, 2.7vw, 2.25rem);
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
        }

        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header class="page-header">
    <img class="logo" src="https://vicksburgschools-cdn.fxbrt.com/downloads/logos_assets/v-logo-glyph.png" alt="Vicksburg V Logo">

<div id="featured"><div class="bg"></div><div class="content"></div></div>
<div id="mini-row"></div>

}; // end THEMES

function applySvgBg(el, themeId) {
    // Plain background — pixel-art SVG themes intentionally disabled.
    el.style.backgroundImage = '';
}

// ── Time helpers ──
function getTargetMs(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const probe = new Date(y, m - 1, d, CONFIG.confettiHour, CONFIG.confettiMin, 0);
    const etDate = new Date(probe.toLocaleString('en-US', { timeZone: 'America/Detroit' }));
    return probe.getTime() + (probe - etDate);
}

function getConfettiEndMs(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const probe = new Date(y, m - 1, d, CONFIG.confettiEndHour, 0, 0);
    const etDate = new Date(probe.toLocaleString('en-US', { timeZone: 'America/Detroit' }));
    return probe.getTime() + (probe - etDate);
}

const events = CONFIG.events.map(e => ({
    ...e,
    targetMs:      getTargetMs(e.date),
    confettiEndMs: getConfettiEndMs(e.date)
}));

function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

function formatDate(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function formatCountdown(ms) {
    if (ms <= 0) return null;
    const s = Math.floor(ms / 1000);
    return {
        days:  Math.floor(s / 86400),
        hours: Math.floor((s % 86400) / 3600),
        mins:  Math.floor((s % 3600) / 60),
        secs:  s % 60
    };
}

function digitsHTML(t) {
    if (!t) return `<div class="zero-msg">COMPLETE</div>`;
    return `<div class="digits">
        <div class="unit"><div class="num">${pad(t.days)}</div><div class="lbl">Days</div></div>
        <div class="sep">:</div>
        <div class="unit"><div class="num">${pad(t.hours)}</div><div class="lbl">Hours</div></div>
        <div class="sep">:</div>
        <div class="unit"><div class="num">${pad(t.mins)}</div><div class="lbl">Min</div></div>
        <div class="sep">:</div>
        <div class="unit"><div class="num">${pad(t.secs)}</div><div class="lbl">Sec</div></div>
    </div>`;
}

// ── Build mini clocks ──
const miniRow = document.getElementById('mini-row');
events.forEach(e => {
    const div = document.createElement('div');
    div.className = 'mini-clock';
    div.id = `mini-${e.id}`;
    div.innerHTML = `<div class="bg"></div><div class="content"><div class="countdown-prefix">Countdown to</div><div class="event-label">${e.label}</div><div class="event-date">${formatDate(e.date)}</div><div class="clock-display"></div></div>`;
    applySvgBg(div.querySelector('.bg'), e.id);
    miniRow.appendChild(div);
});

// ── Featured clock ──
let featuredId = null;

function getNextEvent() {
    const now = Date.now();
    return events.find(e => e.targetMs > now) || null;
}

function updateFeatured(ev) {
    const featured = document.getElementById('featured');
    if (!ev) {
        if (featuredId !== '__done') {
            featuredId = '__done';
            applySvgBg(featured.querySelector('.bg'), 'lastday');
        }
        featured.querySelector('.content').innerHTML =
            `<div class="zero-msg" style="font-size:clamp(2rem,5vw,4rem)">HAVE A GREAT SUMMER!</div>`;
        return;
    }
    if (featuredId !== ev.id) {
        featuredId = ev.id;
        applySvgBg(featured.querySelector('.bg'), ev.id);
    }
    const t = formatCountdown(ev.targetMs - Date.now());
    featured.querySelector('.content').innerHTML =
        `<div class="countdown-prefix">Countdown to</div><div class="event-label">${ev.label}</div><div class="event-date">${formatDate(ev.date)} &bull; 10:56 AM</div>${digitsHTML(t)}`;
}

function updateMinis() {
    const now = Date.now();
    const nextEv = getNextEvent();
    events.forEach(e => {
        const el = document.getElementById(`mini-${e.id}`);
        if (nextEv && e.id === nextEv.id) { el.style.display = 'none'; return; }
        if (now > e.confettiEndMs + 60000 && e.targetMs < now) { el.style.display = 'none'; return; }
        el.style.display = 'flex';
        el.querySelector('.clock-display').innerHTML = digitsHTML(formatCountdown(e.targetMs - now));
    });
}

// ── Confetti ──
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let confettiActive = false;
let confettiColors = [];
let confettiAnimId = null;

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function spawnBurst(colors) {
    for (let i = 0; i < 220; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height * 0.5,
            w: Math.random() * 13 + 4, h: Math.random() * 7 + 3,
            color: colors[Math.floor(Math.random() * colors.length)],
            vx: (Math.random() - 0.5) * 7, vy: Math.random() * 4 + 1,
            rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.22, alpha: 1
        });
    }
}

function spawnDrizzle(colors) {
    if (particles.length < 450) {
        for (let i = 0; i < 6; i++) {
            particles.push({
                x: Math.random() * canvas.width, y: -10,
                w: Math.random() * 11 + 4, h: Math.random() * 6 + 3,
                color: colors[Math.floor(Math.random() * colors.length)],
                vx: (Math.random() - 0.5) * 3, vy: Math.random() * 3 + 1,
                rot: Math.random() * Math.PI * 2, rotV: (Math.random() - 0.5) * 0.16, alpha: 1
            });
        }
    }
}

function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
        if (p.y > canvas.height * 0.8) p.alpha -= 0.02;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
    });
    particles = particles.filter(p => p.alpha > 0 && p.y < canvas.height + 20);
    if (confettiActive) spawnDrizzle(confettiColors);
    if (particles.length > 0 || confettiActive) {
        confettiAnimId = requestAnimationFrame(animateConfetti);
    } else {
        confettiAnimId = null;
    }
}

function startConfetti(colors) {
    confettiColors = colors;
    confettiActive = true;
    spawnBurst(colors);
    if (!confettiAnimId) confettiAnimId = requestAnimationFrame(animateConfetti);
}

function stopConfetti() { confettiActive = false; }

const confettiFired = new Set();
function checkConfetti() {
    const now = Date.now();
    events.forEach(e => {
        if (confettiFired.has(e.id)) return;
        if (e.targetMs <= now) {
            confettiFired.add(e.id);
            if (now <= e.confettiEndMs) {
                startConfetti(e.confettiColors);
                setTimeout(stopConfetti, e.confettiEndMs - now);
            }
        }
    });
}

function tick() {
    const nextEv = getNextEvent();
    updateFeatured(nextEv);
    updateMinis();
    checkConfetti();
}

tick();
setInterval(tick, 1000);
</script>
